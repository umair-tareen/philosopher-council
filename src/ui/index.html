<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Philosopher Council</title>
<style>
  :root {
    --bg: #0d0f14; --panel: #151921; --panel2: #1b202b; --border: #2a3142;
    --text: #e8e6e1; --muted: #8b93a7; --gold: #c9a227; --gold2: #e6c35c;
    --green: #3fb27f; --red: #d05c5c; --blue: #5c8ad0;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .mono { font-family: ui-monospace, Consolas, monospace; }
  header {
    text-align: center; padding: 2.2rem 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background:
      radial-gradient(ellipse 70% 100% at 50% 0%, rgba(201,162,39,0.10), transparent);
  }
  header h1 { font-size: 1.9rem; letter-spacing: 0.16em; color: var(--gold2); font-weight: normal; }
  header .cols { letter-spacing: 0.5em; color: var(--muted); font-size: 1.1rem; margin-top: 0.2rem; }
  header p { color: var(--muted); margin-top: 0.5rem; font-style: italic; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 1.4rem 1rem 4rem; }

  .askbar { display: flex; gap: 0.6rem; margin: 0.4rem 0 0.7rem; }
  .askbar input[type=text] {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 0.85rem 1rem; border-radius: 10px;
    font-family: inherit; font-size: 1rem;
  }
  .askbar input[type=text]:focus { outline: 1px solid var(--gold); }
  .askbar button {
    background: linear-gradient(180deg, var(--gold2), var(--gold)); color: #1a1404;
    border: none; padding: 0 1.5rem; border-radius: 10px; font-size: 1rem;
    font-family: inherit; cursor: pointer; font-weight: bold;
  }
  .askbar button:disabled { opacity: 0.45; cursor: wait; }
  .options { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.4rem; display: flex; gap: 1.2rem; align-items: center; }
  .options label { cursor: pointer; }

  .status { color: var(--gold2); font-style: italic; min-height: 1.4rem; margin-bottom: 1rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 0.9rem; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.1rem; transition: border-color 0.4s, opacity 0.4s;
  }
  .card.pending { opacity: 0.55; }
  .card.pending .thinking { color: var(--muted); font-style: italic; animation: pulse 1.6s infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }
  .card.done { border-color: #3a4254; }
  .card h3 { color: var(--gold2); font-weight: normal; font-size: 1.08rem; }
  .card .meta { color: var(--muted); font-size: 0.8rem; margin: 0.15rem 0 0.6rem; }
  .badge {
    display: inline-block; font-size: 0.72rem; padding: 0.1rem 0.5rem; border-radius: 99px;
    border: 1px solid var(--border); color: var(--muted); margin-left: 0.4rem; vertical-align: middle;
  }
  .score { float: right; font-size: 1.25rem; color: var(--text); }
  .oneliner { font-style: italic; margin-bottom: 0.55rem; line-height: 1.45; }
  .reasoning { color: var(--muted); font-size: 0.88rem; line-height: 1.5; display: none; margin-bottom: 0.55rem; }
  .card.open .reasoning { display: block; }
  .card .toggle { color: var(--blue); font-size: 0.8rem; cursor: pointer; }
  .virtues { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.45rem; margin: 0.55rem 0 0.3rem; }
  .virtue { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .bar { height: 5px; background: var(--panel2); border-radius: 3px; overflow: hidden; margin-top: 3px; }
  .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); width: 0; transition: width 0.8s ease; }

  .synth {
    margin-top: 1.2rem; background: var(--panel2); border: 1px solid var(--gold);
    border-radius: 12px; padding: 1.2rem 1.3rem; display: none;
  }
  .synth h2 { color: var(--gold2); font-weight: normal; font-size: 1.25rem; margin-bottom: 0.7rem; }
  .synth p { line-height: 1.6; margin-bottom: 0.7rem; }
  .synth p b { color: var(--gold2); }

  .final {
    margin-top: 1rem; display: none; text-align: center; padding: 1rem;
    border-radius: 12px; border: 1px solid var(--border); background: var(--panel);
    font-size: 1.1rem;
  }
  .final .rec { text-transform: uppercase; letter-spacing: 0.2em; font-weight: bold; }
  .rec.amplify { color: var(--green); } .rec.track { color: var(--gold2); } .rec.ignore { color: var(--red); }

  .library { margin-top: 2.4rem; }
  .library h2 { color: var(--muted); font-weight: normal; font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.7rem; }
  .library a { color: var(--blue); text-decoration: none; display: block; padding: 0.25rem 0; font-size: 0.95rem; }
  .library a:hover { color: var(--gold2); }
  #transcript {
    display: none; white-space: pre-wrap; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem; margin-top: 1rem; font-size: 0.85rem; line-height: 1.55;
    max-height: 480px; overflow: auto;
  }
  .err { color: var(--red); }
</style>
</head>
<body>
<header>
  <h1>PHILOSOPHER COUNCIL</h1>
  <div class="cols">⚱ ⚱ ⚱ ⚱ ⚱</div>
  <p>Eleven lenses. Four virtues. One judgment. Methodology, not metaphysics.</p>
</header>

<div class="wrap">
  <div class="askbar">
    <input id="q" type="text" placeholder="Put a question to the council…"
           value="">
    <button id="go">Convene</button>
  </div>
  <div class="options">
    <label><input type="checkbox" id="full"> Full council (all ten deliberators)</label>
    <span class="mono" id="modeinfo"></span>
  </div>
  <div class="status" id="status"></div>

  <div class="grid" id="grid"></div>

  <div class="synth" id="synth">
    <h2>Ibn ʿArabī - Synthesis <span class="score" id="synthscore"></span></h2>
    <p><b>Unifying reading.</b> <span id="s1"></span></p>
    <p><b>Hidden continuity.</b> <span id="s2"></span></p>
    <p><b>Caution.</b> <span id="s3"></span></p>
  </div>

  <div class="final" id="final"></div>

  <div class="library">
    <h2>Transcript library</h2>
    <div id="list"></div>
    <div id="transcript" class="mono"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let source = null;

function virtueBars(v) {
  const axes = ['wisdom','courage','justice','temperance'];
  return '<div class="virtues">' + axes.map(a =>
    `<div><div class="virtue">${a}</div><div class="bar"><i data-w="${Math.round((v?.[a] ?? 0)*100)}"></i></div></div>`
  ).join('') + '</div>';
}

function seatCard(seat) {
  return `<div class="card pending" id="card-${seat.id}">
    <h3>${seat.displayName}<span class="badge">${seat.branch}</span></h3>
    <div class="meta">${seat.tradition}</div>
    <div class="thinking">deliberating…</div>
  </div>`;
}

function fillCard(o) {
  const card = $('card-' + o.philosopher);
  if (!card) return;
  card.classList.remove('pending');
  card.classList.add('done');
  card.innerHTML = `
    <span class="score">${o.verdictScore.toFixed(2)}</span>
    <h3>${o.displayName}<span class="badge">${o.branch}</span></h3>
    <div class="meta">${o.model ? o.model : ''}</div>
    <div class="oneliner">“${o.oneLiner}”</div>
    <div class="reasoning">${o.reasoning}${o.concerns?.length ? '<br><br>Concerns: ' + o.concerns.join(' · ') : ''}</div>
    ${virtueBars(o.virtueScores)}
    <span class="toggle">show reasoning</span>`;
  card.querySelector('.toggle').onclick = () => {
    card.classList.toggle('open');
    card.querySelector('.toggle').textContent = card.classList.contains('open') ? 'hide reasoning' : 'show reasoning';
  };
  requestAnimationFrame(() => {
    card.querySelectorAll('.bar i').forEach(b => { b.style.width = b.dataset.w + '%'; });
  });
}

function convene() {
  const q = $('q').value.trim();
  if (!q) return;
  if (source) source.close();
  $('go').disabled = true;
  $('grid').innerHTML = '';
  $('synth').style.display = 'none';
  $('final').style.display = 'none';
  $('status').textContent = 'The council convenes…';
  $('status').classList.remove('err');

  const url = '/api/ask/stream?q=' + encodeURIComponent(q) + ($('full').checked ? '&full=1' : '');
  source = new EventSource(url);

  source.addEventListener('seats', (e) => {
    const { seats } = JSON.parse(e.data);
    $('grid').innerHTML = seats.map(seatCard).join('');
    $('status').textContent = `${seats.length} deliberators seated. Opinions arrive as each concludes.`;
  });
  source.addEventListener('opinion', (e) => fillCard(JSON.parse(e.data)));
  source.addEventListener('synthesis', (e) => {
    const s = JSON.parse(e.data);
    $('s1').textContent = s.unifyingReading;
    $('s2').textContent = s.hiddenContinuity;
    $('s3').textContent = s.mysticalCaution;
    $('synthscore').textContent = s.unifiedScore.toFixed(2);
    $('synth').style.display = 'block';
    $('status').textContent = 'Synthesis delivered. Self-critique in progress…';
  });
  source.addEventListener('verdict', (e) => {
    const v = JSON.parse(e.data);
    $('final').innerHTML =
      `Final score <b>${v.finalScore.toFixed(2)}</b> · ` +
      `<span class="rec ${v.finalRecommendation}">${v.finalRecommendation}</span>` +
      `<div class="meta mono" style="color:var(--muted);font-size:0.78rem;margin-top:0.4rem">` +
      `${v.mode} · ${v.model} · ${v.ralph.length} self-critique pass(es) · saved ${v.file}</div>`;
    $('final').style.display = 'block';
    $('status').textContent = '';
    loadLibrary();
  });
  source.addEventListener('error', (e) => {
    if (e.data) {
      $('status').textContent = 'Error: ' + JSON.parse(e.data).message;
      $('status').classList.add('err');
    }
  });
  source.addEventListener('done', () => { source.close(); $('go').disabled = false; });
  source.onerror = () => { source.close(); $('go').disabled = false; };
}

async function loadLibrary() {
  const res = await fetch('/api/transcripts');
  const items = await res.json();
  $('list').innerHTML = items.length
    ? items.map(t => `<a href="#" data-f="${t.file}">${t.name}</a>`).join('')
    : '<span style="color:var(--muted)">No transcripts yet. Convene the council above.</span>';
  $('list').querySelectorAll('a').forEach(a => a.onclick = async (ev) => {
    ev.preventDefault();
    const md = await (await fetch('/api/transcripts/' + a.dataset.f)).text();
    $('transcript').textContent = md;
    $('transcript').style.display = 'block';
    $('transcript').scrollIntoView({ behavior: 'smooth' });
  });
}

$('go').onclick = convene;
$('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') convene(); });
loadLibrary();
</script>
</body>
</html>
