name: Feature request
description: A new persona, debate mode, provider, fetcher, or capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's missing
      description: The gap or use case, not the implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: If you have one. For new philosophers, see the checklist in CONTRIBUTING.md - and say which documented methodology the persona would be grounded in.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
