version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # One PR per week instead of ten: minor/patch bumps land together.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Staying on zod 3 is deliberate: the degrade-don't-fail schemas in
      # src/council/schemas.ts depend on v3 .catch()/.transform() semantics,
      # and the v4 bump broke them (7 test failures). Migrate intentionally,
      # not via a bot bump.
      - dependency-name: zod
        update-types: ['version-update:semver-major']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
